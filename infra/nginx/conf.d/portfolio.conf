server {
    listen 80;
    server_name thedecoder.in www.thedecoder.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name thedecoder.in www.thedecoder.in;

    ssl_certificate /etc/letsencrypt/live/thedecoder.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thedecoder.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 500M;

    location / {
        proxy_pass http://portfolio:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /_next/static/ {
        proxy_pass http://portfolio:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
